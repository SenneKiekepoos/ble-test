<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sjoelbak Launcher</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    h1 { font-size: 24px; margin-bottom: 6px; color: #00d4ff; }

    #status-balk {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 10px;
    }

    button.connect {
      margin-bottom: 20px;
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #00d4ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .kaart {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
    }

    .kaart h2 {
      font-size: 15px;
      color: #00d4ff;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .knop-rij { display: flex; gap: 10px; }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-reset { background: #f39c12; }
    .btn-start { background: #27ae60; color: #fff; }
    .btn-stop  { background: #e74c3c; color: #fff; }
    .btn-lanceer { background: #00d4ff; }
  </style>
</head>

<body>

<h1>🎯 Sjoelbak</h1>

<div id="status-balk">Niet verbonden</div>

<button class="connect" onclick="verbindBluetooth()">
  🔵 Verbinden met Sjoelbak
</button>

<div class="kaart">
  <h2>Systeem</h2>
  <div class="knop-rij">
    <button class="btn-reset" onclick="stuurCommando('CMD:RESET')">Reset</button>
    <button class="btn-start" onclick="stuurCommando('CMD:MOTOR_START')">Start</button>
    <button class="btn-stop" onclick="stuurCommando('CMD:MOTOR_STOP')">Stop</button>
  </div>
</div>

<div class="kaart">
  <h2>Richten</h2>
  <input type="range" min="78" max="103" value="90"
    oninput="richting(this.value)">
  <div id="richt-waarde">90°</div>
</div>

<div class="kaart">
  <h2>Flywheel</h2>
  <input type="range" min="0" max="255" value="180"
    oninput="snelheid(this.value)">
  <div id="speed-waarde">180</div>
</div>

<div class="kaart">
  <button class="btn-lanceer" onclick="stuurCommando('CMD:LANCEER')">
    🚀 LANCEER
  </button>
</div>

<script>
let rx = null;

const SERVICE_UUID = "12345678-1234-1234-1234-123456789abc";
const RX_UUID      = "12345678-1234-1234-1234-123456789abd";
const TX_UUID      = "12345678-1234-1234-1234-123456789abe";

async function verbindBluetooth() {
  try {
    document.getElementById("status-balk").innerText = "Zoeken...";

    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    rx = await service.getCharacteristic(RX_UUID);

    document.getElementById("status-balk").innerText = "Verbonden ✅";

    device.addEventListener("gattserverdisconnected", () => {
      document.getElementById("status-balk").innerText = "Verbinding verloren ❌";
    });

  } catch (e) {
    document.getElementById("status-balk").innerText = "Fout: " + e;
  }
}

async function stuurCommando(cmd) {
  if (!rx) return alert("Niet verbonden!");
  await rx.writeValue(new TextEncoder().encode(cmd));
}

function richting(v) {
  document.getElementById("richt-waarde").innerText = v + "°";
  stuurCommando("CMD:RICHT:" + v);
}

function snelheid(v) {
  document.getElementById("speed-waarde").innerText = v;
  stuurCommando("CMD:SNELHEID:" + v);
}
</script>

</body>
</html>
